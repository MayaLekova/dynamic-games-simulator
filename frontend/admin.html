<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking reservation system</title>
  </head>
  <script setup type="module">
    import { createTeleportalDevtools } from "https://esm.sh/teleportal@0.0.4/devtools";

    const devtools = createTeleportalDevtools();
    document.getElementById("devtools").appendChild(devtools);

    import { Provider } from "https://esm.sh/teleportal@0.0.4/providers";
    import { createTokenManager } from "https://esm.sh/teleportal@0.0.4/token";
    import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    // just for illustration, we create the token on the client
    // in production, you would generate the token on the server and send it to the client
    const tokenManager = createTokenManager({
      secret: "your-secret-key-here",
      expiresIn: 3600, // 1 hour
      issuer: "my-collaborative-app",
    });

    const adminId = 'designer';
    // create a JWT token for the user
    const token = await tokenManager.createToken(
      // user id
      adminId,
      // room id (multi-tenant)
      "parking-org",
      // document access patterns and permissions
      [
        // allow the user to have full access to system and user state
        {
          pattern: "system_state/*",
          permissions: ["admin"]
        },
        {
          pattern: `user_data/*`,
          permissions: ["admin"]
        },
      ],
    );

    // TODO_3: add passing the token again
    // TODO_4: make the port for WebSockets configurable
    const provider = await Provider.create({
      url: `ws://${window.location.hostname}:3000/?token=${token}`,
      document: 'main-cluster',
    });

    await provider.synced;

    // TODO_11: add multiple agents
    // Transform the map {userId: {...}} to an iterable and view it
    // in a table, as in https://vuejs.org/tutorial/#step-7
    // Maybe we should add a list of known users and read them one by one.
    const userId = 'gencho';
    const gencho_data = provider.doc.getMap(`user_data/${userId}`);
    console.log(gencho_data);
    const all_users = ref([{
      id: userId,
      karma: gencho_data.get('karma'),
      urgency: gencho_data.get('urgency')
    }]);

    const message = ref('Simulation: ');

    // TODO_2: Read the value from the store
    // (we could be reconnecting to a running simulation)
    const system_state = provider.doc.getMap('system_state');
    const simulation_running = ref(system_state.get('simulation_running') || false);

    provider.doc.on('update', (update, origin) => {
      console.log('Document updated');
      console.log(origin);
      // TODO_6: There should be a finer-grained way to update the state.
      // TODO_11: Update gencho_data and similar.
      all_users.value = [{
        id: userId,
        karma: gencho_data.get('karma'),
        urgency: gencho_data.get('urgency')
      }];
    });

    createApp({
      setup() {
        function start_simulation() {
          simulation_running.value = true;
          system_state.set('simulation_running', true);
        }
        // TODO_3: If we want to be fancy, we could add a "pause"
        function stop_simulation() {
          simulation_running.value = false;
          system_state.set('simulation_running', false);
        }
        return {
          message,
          all_users,
          simulation_running,
          start_simulation,
          stop_simulation
        }
      }
    }).mount('#app')
  </script>

  <style type="text/css">
    .form-section {
      padding-top: 6px;
      padding-bottom: 6px;
      border: 2px solid lightblue;
    }
    .form-label {
      margin-right: 10px;
    }
  </style>

  <body>
    <h1>&#x2708; System observation deck &#x2708; </h1>
    <hr/>
    <div id="app">
      <div class="form-section">
        <span class="form-label">{{ message }}</span>
        <span>
          <button @click="start_simulation">&#x25B8; Start</button>
        </span>
        <span>
          <button @click="stop_simulation">&#x25A0; Stop</button>
        </span>
      </div>

      <div id="agents-view">
        <div class="form-section"  v-for="user in all_users" :key="user.id">
          <span class="form-label">{{ user.id }}</b></span> |
          <span class="form-label">urgency: <b>{{ user.urgency }}</b></span> |
          <span class="form-label">karma: <b>{{ user.karma }}</b></span>
        </div>
      </div>
      <!-- TODO_5: The "simulation running" message could be an overlay -->
      <div class="form-section" style="border-color: lightcoral;" v-if="simulation_running">
        Simulation running, please wait...
      </div>

    </div>
    <div
      id="devtools"
      style="
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 300px;
        z-index: 1;
      "
    ></div>
  </body>
</html>
