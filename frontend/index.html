<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking reservation system</title>
  </head>
  <script setup type="module">
    import { createTeleportalDevtools } from "https://esm.sh/teleportal@0.0.4/devtools";

    const devtools = createTeleportalDevtools();
    document.getElementById("devtools").appendChild(devtools);

    import { Provider } from "https://esm.sh/teleportal@0.0.4/providers";
    import { createTokenManager } from "https://esm.sh/teleportal@0.0.4/token";
    import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    // just for illustration, we create the token on the client
    // in production, you would generate the token on the server and send it to the client
    const tokenManager = createTokenManager({
      secret: "your-secret-key-here",
      expiresIn: 3600, // 1 hour
      issuer: "my-collaborative-app",
    });

    // create a JWT token for the user
    const token = await tokenManager.createToken(
      // user id
      "nick",
      // room id (multi-tenant)
      "docs",
      // document access patterns and permissions
      [
        // TODO_5: Give each user permissions to their state only.
        // state: {
            // userId: String,
            // karma: Number,
            // urgency: String,
        // }
        // allow the user to have full access to all documents
        { pattern: "*", permissions: ["admin"] },
      ],
    );

    // TODO_1: add passing the token again
    // TODO_2: make the port for WebSockets configurable
    const provider = await Provider.create({
      //url: `${window.location.origin}/?token=${token}`,
      url: `ws://${window.location.hostname}:3000`,
      document: "test",
    });

    await provider.synced;

    // TODO_3: See if we can build a similar component with a form
    // for the reservation system and add it here.
    // const type = provider.doc.getXmlFragment("prosemirror");

    // const editor = document.createElement("div");
    // editor.setAttribute("id", "editor");
    // const editorContainer = document.createElement("div");
    // editorContainer.insertBefore(editor, null);
    // document.body.insertBefore(editorContainer, null);
    // const { doc, mapping } = initProseMirrorDoc(type, schema);

    // Also, see if we should *actually* have a component.

    const ymap = provider.doc.getMap('data');
    ymap.set('karma', 42);
    ymap.set('urgency', 'medium');
    provider.on("update", (state) => {
      console.log("Connection state:", state.type);
    });

    const message = ref('Please choose your urgency:');
    const karma = ref(ymap.get('karma'))
    // TODO_4: add constants for high/mid/low urgency
    const urgency = ref(ymap.get('urgency'));
    const simulation_running = ref(false);

    createApp({
      setup() {
        // urgency_val should be one of: 'low', 'medium', 'high'
        function set_urgency(urgency_val) {
          if (simulation_running.value) return;

          urgency.value = urgency_val;
          ymap.set('urgency', urgency_val);
        }
        function reserve() {
          simulation_running.value = true;
        }
        return {
          message,
          karma,
          urgency,
          simulation_running,
          set_urgency,
          reserve
        }
      }
    }).mount('#app')
  </script>

  <style type="text/css">
    .form-section {
      padding-top: 6px;
      padding-bottom: 6px;
      border: 2px solid lightblue;
    }
    .form-label {
      margin-right: 10px;
    }
  </style>

  <body>
    <h1>Parking reservation system, v. 0.0.1</h1>
    <hr/>
    <div id="app">
      <div id="karma-view" class="form-section">
        Your currently have <b>{{ karma }}</b> parking points.
      </div>

      <div class="form-section" v-if="!simulation_running">
        <span class="form-label">{{ message }}</span>
        <span>
          <button @click="set_urgency('low')">&#x1F69C; Low</button>
        </span>
        <span>
          <button @click="set_urgency('medium')">&#x1F697; Medium</button>
        </span>
        <span>
          <button @click="set_urgency('high')">&#x1F695; High</button>
        </span>
      </div>

      <div id="urgency-view" class="form-section" v-if="!simulation_running">
        <span class="form-label">Current urgency: <b>{{ urgency }}</b></span>
        <button @click="reserve">Reserve!</button>
      </div>
      <div class="form-section" style="border-color: lightcoral;" v-else>
        Simulation running, please wait...
      </div>

    </div>
    <div
      id="devtools"
      style="
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 300px;
        z-index: 1;
      "
    ></div>
  </body>
</html>
